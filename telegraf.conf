# Telegraf configuration for monitoring the WS Brew Sim OPC UA server

#===============================================================================
# Global Agent Configuration
#===============================================================================
[agent]
  # Default data collection interval
  interval = "10s"
  # Default flush interval for outputs
  flush_interval = "10s"
  # Logfile for Telegraf
  logfile = ""

#===============================================================================
# Output Plugins
#===============================================================================

# Configuration for sending data to InfluxDB
[[outputs.influxdb]]
  # The URLs of your InfluxDB instances.
  # "influxdb" is the hostname of the InfluxDB service in docker-compose.
  urls = ["http://influxdb:8086"]

  # The target database for metrics.
  database = "ws_brew_sim"

  # Authentication (optional if not configured in InfluxDB)
  # These can be set using environment variables for better security,
  # which we will do in the docker-compose.yml file.
  # username = "$INFLUXDB_USER"
  # password = "$INFLUXDB_USER_PASSWORD"

#===============================================================================
# Input Plugins
#===============================================================================

# Read metrics from an OPC UA server
[[inputs.opcua]]
  # A name for this server connection
  name = "ws_brew_sim_server"

  # OPC UA server endpoint.
  # "bakeserver" is the hostname of the application service in docker-compose.
  endpoint = "opc.tcp://bakeserver:4840/wsbrew"

  # Security policy and mode. The server_bake.py example uses no security.
  security_policy = "None"
  security_mode = "None"

  # Connection timeout
  connect_timeout = "20s" # Increased timeout for container startup variance

  timestamp = "server"

  # Define the nodes to read from the server.
  # The namespace index (ns) is determined by the alphabetical order in which
  # the server loads the XML files from the 'xmls' directory.
  # asyncua adds its own server namespace at index 1, so indices from XML files
  # are all shifted by one. "http://bake.example.com" ends up at index 15.
  nodes = [
    { name = "tunnel_oven_temperature",           namespace = "15", identifier_type = "i", identifier = "6262" },
    { name = "tunnel_oven_pressure_flue_gas",     namespace = "15", identifier_type = "i", identifier = "6252" },
    { name = "tunnel_oven_pressure_flue_steam",   namespace = "15", identifier_type = "i", identifier = "6256" },
    { name = "tunnel_oven_operation_duration",    namespace = "15", identifier_type = "i", identifier = "6157" },
    { name = "tunnel_oven_power_on_duration",     namespace = "15", identifier_type = "i", identifier = "6158" },
    { name = "tunnel_oven_operation_duration_consumption", namespace = "15", identifier_type = "i", identifier = "6163" },
    { name = "tunnel_oven_power_on_duration_consumption",  namespace = "15", identifier_type = "i", identifier = "6164" },
    { name = "tunnel_oven_machine_design_speed",  namespace = "15", identifier_type = "i", identifier = "6250" },
    { name = "tunnel_oven_good_products",         namespace = "15", identifier_type = "i", identifier = "6241" },
    { name = "tunnel_oven_scrap_products",        namespace = "15", identifier_type = "i", identifier = "6260" },
  ]
