<h2>Unit Details</h2>
<p><strong>Name:</strong> {{ unit.name }}</p>
<p><strong>ID:</strong> {{ unit.serial_number }}</p>
<div class="flexlist">
    <table>
        <thead>
            <tr>
                <th>Module</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for module in unit.modules %}
                <tr>
                    <td>{{ module.name }}</td>
                    <td hx-get="/value/{{unit.name}}/{{module.name}}" hx-swap="innerHTML" hx-trigger="load, every 2s">Loading...</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="flexlist flexcol">
        <div id="operationmode" hx-get="statemachine/{{unit.name}}/?statename=operation_mode" hx-swap="innerHTML" hx-trigger="load, every 2s">Loading...</div>
        <div id="machinestate" hx-get="statemachine/{{unit.name}}/?statename=machine_state" hx-swap="innerHTML" hx-trigger="load, every 2s">Loading...</div>
    </div>
</div>
