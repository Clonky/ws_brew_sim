version: '3.7'

services:
  bakeserver:
    build: .
    container_name: bakeserver
    ports:
      - "8080:8080"
    restart: always

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=ws_brew_sim
      # You can change the user and password if you wish
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=password
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: always

  telegraf:
    image: telegraf:1.24
    container_name: telegraf
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - influxdb
      - bakeserver
    restart: always

volumes:
  influxdb_data:
